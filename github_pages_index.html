    .btn-xs:hover { background: var(--bg2); }

    .hero p { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
    .hero-stats { display: flex; gap: 8px; flex-wrap: wrap; }

    .pb { background: var(--bg); border: .5px solid var(--border); border-radius: var(--r-md); padding: 9px 8px; cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; line-height: 1.4; transition: all .15s; }
    .pb:hover { border-color: var(--blue); color: var(--blue); background: var(--bg-info); }
    .pb small { display: block; font-size: 10px; color: var(--text2); font-weight: 400; margin-top: 2px; }

    /* TABS */
    .tab-bar { display: flex; border-bottom: .5px solid var(--border); margin: 6px 0 12px; }
    .tab { padding: 8px 16px; font-size: 12px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }

    .tbadge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
    .tbi { background: var(--bg-info); color: var(--text-info); }
    .tbg { background: var(--green-bg); color: var(--green-text); }

    /* FILTER */
    .filter-row { display: flex; gap: 5px; margin-bottom: 11px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 3px 10px; border: .5px solid var(--border2); border-radius: 20px; cursor: pointer; background: var(--bg); color: var(--text2); transition: all .15s; }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.on { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* CARDS */
    .cards { display: flex; flex-direction: column; gap: 9px; }
    .card { background: var(--bg); border: .5px solid var(--border); border-radius: var(--r-lg); padding: 13px 15px; transition: border-color .15s; }
    .card:hover { border-color: var(--border2); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 7px; margin-bottom: 6px; }
    .card-name { font-size: 13px; font-weight: 600; line-height: 1.4; }
    .card-org { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 3px; }

    .tag { font-size: 10px; padding: 2px 6px; border-radius: 5px; border: .5px solid; }
    .tf { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .tp { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
    .tg { background: var(--bg-info); color: var(--text-info); border-color: rgba(24,95,165,.3); }

    .notice { font-size: 10px; color: var(--text-warn); background: var(--bg-warn); border: .5px solid var(--amber-border); border-radius: 5px; padding: 3px 8px; margin: 6px 0 4px; display: flex; align-items: center; gap: 3px; }

let S = {region:null,pref:null,tab:"job",filter:"all"};

// ===== localStorage（GitHub Pages対応） =====
function loadData() {
  try {
    const jr = localStorage.getItem(SK_JOBS);
    const gr = localStorage.getItem(SK_GRADS);
    JOBS  = jr ? JSON.parse(jr) : JSON.parse(JSON.stringify(DJ));
    GRADS = gr ? JSON.parse(gr) : JSON.parse(JSON.stringify(DG));
    if (!jr) localStorage.setItem(SK_JOBS,  JSON.stringify(JOBS));
    if (!gr) localStorage.setItem(SK_GRADS, JSON.stringify(GRADS));
  } catch(e) {
    JOBS  = JSON.parse(JSON.stringify(DJ));
    GRADS = JSON.parse(JSON.stringify(DG));
  }
  render();
}
function saveJ() { try { localStorage.setItem(SK_JOBS,  JSON.stringify(JOBS));  } catch(e){} }
function saveG() { try { localStorage.setItem(SK_GRADS, JSON.stringify(GRADS)); } catch(e){} }

// ===== UTILS =====
function gid(p) { return p + "_" + Date.now(); }
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function toast(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2200); }

// ===== RENDER =====
function render() {
  const hr = document.getElementById("hdr-r");
  hr.innerHTML = isAdmin
    ? '<button class="btn-xs on"><i class="ti ti-lock-open" style="font-size:11px"></i>管理中</button><button class="btn-xs" onclick="logout()"><i class="ti ti-logout" style="font-size:11px"></i>ログアウト</button>'
    : '<button class="btn-xs" onclick="showLogin()"><i class="ti ti-settings" style="font-size:11px"></i>管理者ログイン</button>';
  const app = document.getElementById("app");
  const bc  = document.getElementById("bc-area");
  if (isAdmin) { bc.innerHTML = ""; app.innerHTML = ""; renderAdmin(app); }
  else { renderBC(bc); app.innerHTML = ""; renderPublic(app); }
}

function renderBC(bc) {
  let h = '<a onclick="goHome()">ホーム</a>';
  if (S.region) {
    const r = REGIONS.find(x => x.id === S.region);
    h += '<span class="sep"><i class="ti ti-chevron-right" style="font-size:10px"></i></span>';
    h += S.pref ? '<a onclick="goPref()">' + r.name + '</a>' : '<span class="cur">' + r.name + '</span>';
  }
  if (S.pref) h += '<span class="sep"><i class="ti ti-chevron-right" style="font-size:10px"></i></span><span class="cur">' + S.pref + '</span>';
  bc.innerHTML = '<div class="bc">' + h + '</div>';
}

function renderPublic(el) {
  const wrap = document.createElement("div");
  if (!S.region) { renderHero(el); wrap.className = "content"; el.appendChild(wrap); renderRegion(wrap); }
  else if (!S.pref) { wrap.className = "content"; el.appendChild(wrap); renderPref(wrap); }
  else { wrap.className = "content"; el.appendChild(wrap); renderInfo(wrap); }
}

function renderHero(el) {
  const tj = PREFS.reduce((a,p) => a + (JOBS[p]||[]).length, 0);
  const tg = PREFS.reduce((a,p) => a + (GRADS[p]||[]).length, 0);
  el.insertAdjacentHTML("beforeend",
    '<div class="hero"><h1>臨床検査技師のための<br>就活・院試情報ナビ</h1>'
    + '<p>新卒向け求人情報・大学院入試情報を都道府県別にまとめています。<br>まずは地方を選択してください。</p>'
    + '<div class="hero-stats">'
    + '<div class="hstat"><i class="ti ti-briefcase"></i><div><div class="hstat-n">' + tj + '</div><div class="hstat-l">求人掲載数</div></div></div>'
    + '<div class="hstat"><i class="ti ti-school"></i><div><div class="hstat-n">' + tg + '</div><div class="hstat-l">院試情報数</div></div></div>'
    + '<div class="hstat"><i class="ti ti-map-pin"></i><div><div class="hstat-n">' + PREFS.length + '</div><div class="hstat-l">対応県数</div></div></div>'
    + '</div></div>');
}

function renderRegion(el) {
  el.innerHTML = '<div class="sec-lbl">地方を選択</div>'

      '<div class="rc' + (r.ready ? '' : ' disabled') + '" onclick="selRegion(\'' + r.id + '\')">'

      + '<span>' + r.name + '</span>'
      + (r.ready ? '<span class="rc-badge">対応済</span>' : '<small>準備中</small>')
      + '</div>').join("") + '</div>';
}

      + '<div class="meta-row"><span><i class="ti ti-coin" style="font-size:11px;margin-top:1px"></i>' + esc(item.salary) + '</span></div>'

    else return '<div class="card">'

      + '<div class="tag-row">' + tags + '</div>'
      + '<div class="meta-row"><span><i class="ti ti-calendar" style="font-size:11px;margin-top:1px"></i>試験時期：' + esc(item.exam) + '</span></div>'
      + (item.session ? '<div class="meta-row"><span><i class="ti ti-presentation" style="font-size:11px;margin-top:1px"></i>説明会：' + esc(item.session) + '</span></div>' : '')
      + '<div class="meta-row"><span><i class="ti ti-microscope" style="font-size:11px;margin-top:1px"></i>' + esc(item.courses) + '</span></div>'
      + '<div class="meta-row"><span><i class="ti ti-info-circle" style="font-size:11px;margin-top:1px"></i>' + esc(item.detail) + '</span></div>'
      + NOTICE + '<div class="card-foot"><div></div>' + btns + '</div></div>';
  }).join("");
}

// ===== LOGIN =====
function showLogin() {
  document.getElementById("modal-area").innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">'
    + '<div class="modal">'
    + '<div class="modal-title"><i class="ti ti-lock" style="color:var(--blue);font-size:16px"></i>管理者ログイン</div>'
    + '<div class="modal-sub">管理者専用画面です。<br>パスワードを入力してください。</div>'
    + '<div class="fg"><label>パスワード</label>'
    + '<input type="password" id="pw" placeholder="パスワードを入力" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
    + '<div class="err" id="login-err">パスワードが正しくありません</div>'
    + '<div class="modal-btns"><button class="btn-p" onclick="doLogin()">ログイン</button><button class="btn-g" onclick="closeModal()">キャンセル</button></div>'
    + '</div></div>';
  setTimeout(() => { const el = document.getElementById("pw"); if (el) el.focus(); }, 50);
}
function doLogin() {
  const pw = (document.getElementById("pw")||{}).value||"";
  if (pw === ADMIN_PW) { closeModal(); isAdmin = true; toast("✓ ログインしました"); render(); }
  else { const e = document.getElementById("login-err"); if (e) e.classList.add("show"); }
}
function closeModal() { document.getElementById("modal-area").innerHTML = ""; }
function logout() { isAdmin = false; editItem = null; toast("ログアウトしました"); render(); }

// ===== ADMIN =====
function renderAdmin(el) {
  const allJ = PREFS.flatMap(p => (JOBS[p]||[]).map(x => ({...x, pref:p})));
  const allG = PREFS.flatMap(p => (GRADS[p]||[]).map(x => ({...x, pref:p})));
  el.innerHTML = '<div class="admin-wrap">'
    + '<div class="admin-hd"><div class="admin-hd-title"><i class="ti ti-settings" style="font-size:15px"></i>管理画面</div>'
    + '<button class="btn-p" onclick="showForm()"><i class="ti ti-plus" style="font-size:11px"></i> 新規追加</button></div>'
    + '<div id="form-area"></div>'
    + '<div class="atab-bar">'
    + '<div class="atab' + (adminTab==="job"?" on":"") + '" onclick="setATab(\'job\')">求人情報<span class="tbadge tbi">' + allJ.length + '</span></div>'
    + '<div class="atab' + (adminTab==="grad"?" on":"") + '" onclick="setATab(\'grad\')">大学院・院試<span class="tbadge tbg">' + allG.length + '</span></div>'
    + '</div><div id="alist"></div></div>';
  renderAList();
}

function renderAList() {
  const area = document.getElementById("alist"); if (!area) return;
  const list = adminTab==="job"
    ? PREFS.flatMap(p => (JOBS[p]||[]).map(x => ({...x,pref:p})))
    : PREFS.flatMap(p => (GRADS[p]||[]).map(x => ({...x,pref:p})));
  if (!list.length) { area.innerHTML = '<div class="empty">データがありません</div>'; return; }
  area.innerHTML = list.map(item => {
    const tags = item.tags.map(t => '<span class="tag ' + t + '">' + (TL[t]||t) + '</span>').join("");
    const meta = adminTab==="job"
      ? '<span>締切：' + esc(item.deadline) + '</span><span>' + esc(item.salary) + '</span>'
      : '<span>試験：' + esc(item.exam) + '</span>';
    return '<div class="acard"><div class="acard-info">'
      + '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="acard-name">' + esc(item.name) + '</span><span class="pbadge">' + item.pref + '</span></div>'
      + '<div class="acard-org">' + esc(item.org) + '</div>'
      + '<div class="acard-meta">' + meta + '</div>'
      + '<div class="tag-row" style="margin-top:5px;margin-bottom:0">' + tags + '</div></div>'
      + '<div class="acard-acts">'
      + '<button class="btn-icon" title="編集" onclick="editEntry(\'' + item.id + '\',\'' + adminTab + '\',\'' + item.pref + '\')"><i class="ti ti-edit" style="font-size:11px"></i></button>'
      + '<button class="btn-icon" title="削除" style="border-color:#a32d2d;color:#a32d2d" onclick="delEntry(\'' + item.id + '\',\'' + adminTab + '\',\'' + item.pref + '\')"><i class="ti ti-trash" style="font-size:11px"></i></button>'
      + '</div></div>';
  }).join("");
}

function showForm() { editItem = null; renderForm(adminTab, "", null); }
function editEntry(id, type, pref) {
  const l = type==="job" ? (JOBS[pref]||[]) : (GRADS[pref]||[]);
  const item = l.find(x => x.id===id); if (!item) return;
  editItem = {id, type, pref}; renderForm(type, pref, item);
}
function renderForm(type, pv, item) {
  const fa = document.getElementById("form-area"); if (!fa) return;
  const ie = !!item, v = k => esc(item ? (item[k]||"") : "");
  const po = PREFS.map(p => '<option value="' + p + '"' + (p===pv?" selected":"") + '>' + p + '</option>').join("");
  let h = '<div class="form-box"><div class="form-box-hd"><i class="ti ti-' + (ie?"edit":"plus") + '" style="font-size:13px"></i>'
    + (ie ? (type==="job"?"求人情報を編集":"院試情報を編集") : (type==="job"?"求人情報を追加":"院試情報を追加")) + '</div>'
    + '<div class="fg"><label>都道府県</label><select id="f_p">' + po + '</select></div>'
    + '<div class="form-grid">';
  if (type==="job") {
    h += '<div class="fg form-full"><label>求人名 *</label><input id="f_n" value="' + v("name") + '" placeholder="例：臨床検査技師（新卒）"></div>'
      + '<div class="fg form-full"><label>医療機関名 *</label><input id="f_o" value="' + v("org") + '" placeholder="例：○○大学病院"></div>'
      + '<div class="fg"><label>給与</label><input id="f_s" value="' + v("salary") + '" placeholder="例：月給20万円〜"></div>'
      + '<div class="fg"><label>応募締切</label><input id="f_dl" value="' + v("deadline") + '" placeholder="例：2025年10月31日"></div>'
      + '<div class="fg form-full"><label>業務内容・詳細</label><textarea id="f_d" placeholder="業務内容・待遇など">' + v("detail") + '</textarea></div>'
      + '<div class="fg form-full"><label>公式サイトURL</label><input id="f_u" value="' + v("url") + '" placeholder="https://..."></div>'
      + '<div class="fg form-full"><label>雇用形態</label><div class="tc">'
      + '<label><input type="checkbox" id="t_tf"' + (item&&item.tags.includes("tf")?" checked":"") + '>正職員</label>'
      + '<label><input type="checkbox" id="t_tp"' + (item&&item.tags.includes("tp")?" checked":"") + '>パート可</label>'
      + '</div></div>';
  } else {
    h += '<div class="fg form-full"><label>研究科・専攻名 *</label><input id="f_n" value="' + v("name") + '" placeholder="例：医学系研究科 医科学専攻"></div>'
      + '<div class="fg form-full"><label>大学院名 *</label><input id="f_o" value="' + v("org") + '" placeholder="例：○○大学大学院"></div>'
      + '<div class="fg"><label>試験時期</label><input id="f_ex" value="' + v("exam") + '" placeholder="例：8月（推定）"></div>'
      + '<div class="fg"><label>説明会</label><input id="f_se" value="' + v("session") + '" placeholder="例：5月10日（土）"></div>'
      + '<div class="fg form-full"><label>関連講座</label><input id="f_co" value="' + v("courses") + '" placeholder="例：臨床検査学・病理学ほか"></div>'
      + '<div class="fg form-full"><label>詳細・備考</label><textarea id="f_d" placeholder="試験内容・募集人数など">' + v("detail") + '</textarea></div>'
      + '<div class="fg form-full"><label>公式サイトURL</label><input id="f_u" value="' + v("url") + '" placeholder="https://..."></div>';
  }
  h += '</div><div class="form-actions">'
    + '<button class="btn-p" onclick="submitForm(\'' + type + '\')">' + (ie?"更新する":"追加する") + '</button>'
    + '<button class="btn-g" onclick="cancelForm()">キャンセル</button>'
    + (ie ? '<button class="btn-d" onclick="delEntry(\'' + item.id + '\',\'' + type + '\',\'' + pv + '\')">削除</button>' : '')
    + '</div></div>';
  fa.innerHTML = h;
  fa.scrollIntoView({behavior:"smooth", block:"nearest"});
  setTimeout(() => { const el = document.getElementById("f_n"); if (el) el.focus(); }, 80);
}

function submitForm(type) {
  const pref = (document.getElementById("f_p")||{}).value||"";
  const name = ((document.getElementById("f_n")||{}).value||"").trim();
  const org  = ((document.getElementById("f_o")||{}).value||"").trim();
  if (!name||!org) { toast("⚠ 名称と機関名は必須です"); return; }
  const url    = ((document.getElementById("f_u")||{}).value||"").trim();
  const detail = ((document.getElementById("f_d")||{}).value||"").trim();
  if (type==="job") {
    const tags = [];
    if (document.getElementById("t_tf")?.checked) tags.push("tf");
    if (document.getElementById("t_tp")?.checked) tags.push("tp");
    if (!tags.length) tags.push("tf");
    const e = {id:editItem?editItem.id:gid("j"),name,org,tags,
      salary:((document.getElementById("f_s")||{}).value||"").trim(),
      deadline:((document.getElementById("f_dl")||{}).value||"随時募集").trim(),detail,url};
    if (editItem) {
      if (editItem.pref!==pref) { JOBS[editItem.pref]=(JOBS[editItem.pref]||[]).filter(x=>x.id!==editItem.id); if(!JOBS[pref])JOBS[pref]=[]; JOBS[pref].push(e); }
      else { const i=(JOBS[pref]||[]).findIndex(x=>x.id===editItem.id); if(i>=0)JOBS[pref][i]=e; else { if(!JOBS[pref])JOBS[pref]=[]; JOBS[pref].push(e); } }
    } else { if(!JOBS[pref])JOBS[pref]=[]; JOBS[pref].push(e); }
    saveJ(); toast("✓ 求人情報を" + (editItem?"更新":"追加") + "しました");
  } else {
    const e = {id:editItem?editItem.id:gid("g"),name,org,tags:["tg"],
      exam:((document.getElementById("f_ex")||{}).value||"").trim(),
      session:((document.getElementById("f_se")||{}).value||"").trim(),
      courses:((document.getElementById("f_co")||{}).value||"").trim(),detail,url};
    if (editItem) {
      if (editItem.pref!==pref) { GRADS[editItem.pref]=(GRADS[editItem.pref]||[]).filter(x=>x.id!==editItem.id); if(!GRADS[pref])GRADS[pref]=[]; GRADS[pref].push(e); }
      else { const i=(GRADS[pref]||[]).findIndex(x=>x.id===editItem.id); if(i>=0)GRADS[pref][i]=e; else { if(!GRADS[pref])GRADS[pref]=[]; GRADS[pref].push(e); } }
    } else { if(!GRADS[pref])GRADS[pref]=[]; GRADS[pref].push(e); }
    saveG(); toast("✓ 院試情報を" + (editItem?"更新":"追加") + "しました");
  }
  editItem = null; cancelForm(); renderAList();
}

function delEntry(id, type, pref) {
  if (!confirm("この情報を削除しますか？")) return;
  if (type==="job") { JOBS[pref]=(JOBS[pref]||[]).filter(x=>x.id!==id); saveJ(); }
  else { GRADS[pref]=(GRADS[pref]||[]).filter(x=>x.id!==id); saveG(); }
  toast("✓ 削除しました"); cancelForm(); renderAList();
}
function cancelForm() { editItem = null; const fa = document.getElementById("form-area"); if (fa) fa.innerHTML = ""; }
function setATab(t) { adminTab = t; renderAList(); }

// ===== NAV =====
function selRegion(id) { if (!REGIONS.find(x=>x.id===id)?.ready) return; S = {region:id,pref:null,tab:"job",filter:"all"}; render(); }
function selPref(p)    { S.pref=p; S.tab="job"; S.filter="all"; render(); }
function setTab(t)     { S.tab=t; S.filter="all"; const w=document.querySelector(".content"); if(w)renderInfo(w); }
function setFilter(f)  { S.filter=f; renderCards(); }
function goHome()      { S={region:null,pref:null,tab:"job",filter:"all"}; render(); }
function goPref()      { S.pref=null; S.tab="job"; S.filter="all"; render(); }

// ===== START =====
loadData();
</script>
</body>
</html>
